name: Snapshot Sheet data to static JSON

# Pulls each sheet from the Apps Script endpoint (server-side / anonymous —
# no Google account attached, so it never hits the "unable to open the file"
# signed-in-account error), writes assets/data/<sheet>.json, and commits ONLY
# when the data actually changed. The commit triggers the existing Pages deploy,
# which publishes the fresh JSON. The live browser never talks to Apps Script.
#
# SETUP (one time): add a repo secret named APPS_SCRIPT_ENDPOINT containing the
#   /exec URL, e.g. https://script.google.com/macros/s/AKfyc.../exec
#   (Repo → Settings → Secrets and variables → Actions → New repository secret)

on:
  schedule:
    - cron: '*/5 * * * *'        # every ~5 min (GitHub may delay); commits only on change
  workflow_dispatch:              # "Run workflow" button = instant refresh during the event
  push:
    branches: [main]
    paths:
      - '.github/workflows/snapshot-data.yml'   # re-run when this file changes

# Allow the job to push the refreshed JSON back to the repo.
permissions:
  contents: write

# Never run two snapshots at once.
concurrency:
  group: snapshot-data
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch sheets → assets/data/*.json
        env:
          ENDPOINT: ${{ secrets.APPS_SCRIPT_ENDPOINT }}
        run: |
          set -uo pipefail
          if [ -z "${ENDPOINT:-}" ]; then
            echo "::error::Repo secret APPS_SCRIPT_ENDPOINT is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

          mkdir -p assets/data
          SHEETS="config programme speakers rise downloads gallery faq sponsors contact"

          for s in $SHEETS; do
            echo "Fetching '$s'…"
            resp=$(curl -fsSL --max-time 60 "${ENDPOINT}?sheet=${s}") || {
              echo "::warning::fetch failed for '$s' — keeping previous snapshot";
              continue;
            }
            # Validate the envelope { status:"ok", data:[...] } and store just the array.
            if echo "$resp" | jq -e '.status=="ok" and (.data|type=="array" or type=="object")' >/dev/null 2>&1; then
              echo "$resp" | jq '.data' > "assets/data/${s}.json.tmp" && mv "assets/data/${s}.json.tmp" "assets/data/${s}.json"
              echo "  ✓ $(echo "$resp" | jq '.data | length') rows"
            else
              echo "::warning::bad/empty payload for '$s' — keeping previous snapshot"
              rm -f "assets/data/${s}.json.tmp"
            fi
          done

      - name: Commit only if the data changed
        run: |
          set -uo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the sheet files (not the manifest) to decide if anything changed.
          git add assets/data/*.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi

          # Data changed → stamp a manifest so the frontend can show "last updated".
          printf '{\n  "buildTime": "%s",\n  "commit": "%s"\n}\n' \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${GITHUB_SHA:0:7}" > assets/data/manifest.json
          git add assets/data/manifest.json

          git commit -m "data: refresh static JSON snapshot"
          git push
