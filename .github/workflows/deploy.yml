name: Deploy to GitHub Pages

# Deploy the static site on every push to main, plus a manual trigger.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Collapse rapid pushes: a newer run cancels the in-progress one instead of
# queuing behind it. This is what prevents the "Deployment failed, try again
# later" rate-limit pileup — fewer, serialized deployments per hour.
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so stamp-version.sh can find the last code commit

      - name: Auto-stamp asset versions (cache-busting)
        run: bash scripts/stamp-version.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the repo root (index.html + assets/ live here).
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
